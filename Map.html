<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <title>ОъОцОф ОЌОЋОЮ ОљОќОЋОеОЎОф Рђћ ОъОЊОЊ ОфОаОЋОбОћ ОљОеОдОЎ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    html, body { margin: 0; height: 100%; font-family: Arial, Helvetica, sans-serif; }
    #map { position: absolute; inset: 0; }
    .panel {
      position: absolute; top: 12px; right: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95); border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      max-width: 230px; color: #1f2937;
    }
    .panel h1 { font-size: 15px; margin: 0 0 4px; }
    .panel .sub { font-size: 12px; color: #475569; margin-bottom: 8px; }
    .panel .idx { font-size: 26px; font-weight: bold; margin: 2px 0 8px; }
    .legend div { font-size: 12px; line-height: 20px; }
    .legend i { display: inline-block; width: 14px; height: 12px; border-radius: 3px;
                margin-left: 7px; vertical-align: middle; opacity: 0.85; }
    .empty { font-size: 12px; color: #b45309; margin-top: 6px; }
    .region-label { font-weight: bold; font-size: 13px; color: #1f2937;
                    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <h1>­Ъџд ОъОцОф ОЌОЋОЮ ОљОќОЋОеОЎОф</h1>
    <div class="sub" id="sub">Рђћ</div>
    <div class="idx" id="idx"></div>
    <div class="legend">
      <div><i style="background:#C00000"></i>ОЌОеОЎОњ ОъОљОЋОЊ (&gt;50%)</div>
      <div><i style="background:#BF6000"></i>ОбОъОЋОА (&gt;25%)</div>
      <div><i style="background:#996600"></i>ОъОфОЋОЪ (&gt;10%)</div>
      <div><i style="background:#006100"></i>ОфОДОЎОЪ (┬▒10%)</div>
      <div><i style="background:#1E40AF"></i>ОўОЋОЉ ОъОћОеОњОЎОю</div>
      <div><i style="background:#475569"></i>ОљОЎОЪ ОаОфОЋОаОЎОЮ</div>
    </div>
    <div class="empty" id="empty"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    var payload = <?!= data ?>;

    // Mirror of _nciStatus thresholds/colors (single source of truth lives server-side).
    function colorFor(dev) {
      if (dev == null) return '#475569';
      if (dev > 50)  return '#C00000';
      if (dev > 25)  return '#BF6000';
      if (dev > 10)  return '#996600';
      if (dev >= -10) return '#006100';
      return '#1E40AF';
    }
    function labelFor(dev) {
      if (dev == null) return 'ОљОЎОЪ ОаОфОЋОаОЎОЮ';
      if (dev > 50)  return 'ОЌОеОЎОњ ОъОљОЋОЊ';
      if (dev > 25)  return 'ОбОъОЋОА';
      if (dev > 10)  return 'ОъОфОЋОЪ';
      if (dev >= -10) return 'ОфОДОЎОЪ';
      return 'ОўОЋОЉ ОъОћОеОњОЎОю';
    }
    // Wrap in a LTR isolate (U+2066РђдU+2069) so "-22.6%" keeps the minus on the
    // LEFT inside the RTL page instead of flipping to the right.
    function fmtPct(v) {
      var r = Math.round(v * 10) / 10;
      return 'РЂд' + (r > 0 ? '+' : '') + r + '%РЂЕ';
    }
    function centroid(ring) {
      var la = 0, lo = 0;
      ring.forEach(function(p) { la += p[0]; lo += p[1]; });
      return [la / ring.length, lo / ring.length];
    }

    var map = L.map('map').setView([31.4, 35.0], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var regions = payload.regions || {}, devs = payload.devs || {};
    var bounds = [];
    Object.keys(regions).forEach(function(name) {
      var ring = regions[name];
      if (!ring || !ring.length) return;
      var d = devs[name] ? devs[name].devPct : null;
      var jams = devs[name] ? devs[name].jams : 0;
      var col = colorFor(d);
      var poly = L.polygon(ring, {
        color: col, weight: 2, opacity: 0.9, fillColor: col, fillOpacity: 0.45
      }).addTo(map);
      var devTxt = d == null ? 'ОљОЎОЪ ОаОфОЋОаОЎОЮ' : fmtPct(d) + ' ┬и ' + labelFor(d);
      poly.bindPopup('<b>' + name + '</b><br>' + devTxt + '<br>' + jams + ' ОцОДОДОЎОЮ');
      L.marker(centroid(ring), {
        icon: L.divIcon({ className: 'region-label',
          html: name + '<br>' + (d == null ? 'Рђћ' : fmtPct(d)), iconSize: [70, 32] }),
        interactive: false
      }).addTo(map);
      ring.forEach(function(p) { bounds.push(p); });
    });
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });

    var meta = payload.meta;
    if (meta) {
      document.getElementById('sub').textContent = 'ОъОАОњОеОф ' + meta.key + ' (' + meta.range + ')';
      var idx = document.getElementById('idx');
      idx.textContent = meta.indexPct == null ? '' : fmtPct(meta.indexPct);
      idx.style.color = colorFor(meta.indexPct);
    } else {
      document.getElementById('sub').textContent = 'ОљОЎОЪ ОаОфОЋОаОЎОЮ ОЌОЎОЎОЮ';
      document.getElementById('empty').textContent =
        'ОюОљ ОаОъОдОљ ОЌОюОЋОЪ ОбОЮ ОаОфОЋОаОЎ ОъОАОюОЋОюОЎОЮ. ОћОеОЦ "ОЌОЕОЉ ОъОЊОЊ ОљОеОдОЎ ОбОЏОЕОЎОЋ" ОЋОўОбОЪ ОаОфОЋОаОЎОЮ ОбОЊОЏОаОЎОЎОЮ.';
    }
  </script>
</body>
</html>
